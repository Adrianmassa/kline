<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K線分析（穩定版）</title>

<style>
body{
  margin:0;
  background:#0a0f1a;
  color:#e2e8f0;
  font-family:Arial;
}
.box{
  margin:16px;
  padding:16px;
  border-radius:12px;
  background:#111827;
  border:1px solid #1e2d45;
}
.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}
.bar{
  height:6px;
  background:#1a2235;
  border-radius:4px;
  overflow:hidden;
}
.fill{
  height:100%;
}
.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#f59e0b;}
</style>
</head>

<body>

<div id="app"></div>

<script>

function render(data){

  let structColor =
    data.structScore >=70 ? "#22c55e":
    data.structScore >=40 ? "#f59e0b":
    "#ef4444";

  let stageAction = {
    "高檔整理/轉弱":"⚠️ 禁止加碼",
    "出貨/跌破段":"🚨 應減碼",
    "底部反彈":"👁️ 觀察",
    "突破段":"🚀 可追蹤",
    "初升段":"✅ 可續抱"
  };

  document.getElementById("app").innerHTML = `

  <div class="box">
    <div class="title">${data.name}</div>

    <div style="margin-bottom:8px">
      階段：<b>${data.stage}</b>
    </div>

    <div style="margin-bottom:8px">
      操作：<b>${stageAction[data.stage] || "觀察"}</b>
    </div>

    <div style="margin-bottom:6px">結構評分</div>
    <div class="bar">
      <div class="fill" style="width:${data.structScore}%;background:${structColor}"></div>
    </div>
    <div style="margin-bottom:12px">${data.structScore} / 100</div>

    <div style="opacity:0.6;margin-bottom:6px">多空強度（輔助）</div>
    <div class="bar">
      <div class="fill" style="width:${data.biasScore}%;background:#38bdf8"></div>
    </div>
    <div style="opacity:0.6">${data.biasScore}</div>

  </div>

  <div class="box">
    <div class="title">結論</div>
    ${data.summary}
  </div>

  `;
}


/* ===== 測試資料（你這張圖的情境）===== */

render({
  name:"正新",
  stage:"高檔整理/轉弱",
  structScore:76,
  biasScore:95,
  summary:"三框架上漲，但動能轉弱，高檔整理，避免追高"
});

</script>

</body>
</html>
